name: Edició diària IA.cat
on:
  schedule:
    - cron: '0 6 * * *' # 08:00 Europe/Madrid durant CEST; ajusta-ho amb canvi d'hora.
  workflow_dispatch:
permissions:
  contents: write
jobs:
  generate-edition:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run publish:daily
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      - name: Desa l’edició
        run: |
          git config user.name "IA.cat editorial bot"
          git config user.email "editorial-bot@users.noreply.github.com"
          git add public/content/latest.json public/assets/daily
          git diff --cached --quiet || git commit -m "publica: edició diària"
          git push
