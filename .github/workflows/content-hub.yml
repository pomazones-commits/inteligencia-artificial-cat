name: Content Hub — completar l'edició

on:
  push:
    branches: [main]
    paths:
      - incoming/news-batch.json
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: content-hub-${{ github.ref }}
  cancel-in-progress: false

jobs:
  completar-edicio:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[content-hub]')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Recuperar el web i l'historial
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Preparar Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validar i acumular el lot de Claude
        run: >-
          node automation/scripts/content-hub.mjs ingest-news
          --input incoming/news-batch.json
          --public-dir public
          --state-dir .content-state
          --target 20

      - name: Executar proves de seguretat
        run: node --test automation/tests/content-hub.test.mjs

      - name: Publicar només si tot és correcte
        run: |
          git config user.name "intel·ligènciaartificial.cat bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/news.js public/radar.js public/content-status.json public/data/ public/content/ .content-state/
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "[content-hub] completa l'edició automàtica"
          git pull --rebase origin main
          git push origin main
