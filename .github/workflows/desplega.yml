name: Desplega la web a Hostinger

on:
  push:
    branches: [main]
    paths: ['public/**']
  workflow_dispatch:
  # Els commits del Content Hub es fan amb el GITHUB_TOKEN per defecte, i GitHub
  # Actions no encadena workflows a partir d'aquests pushos. Per aixo tambe ens
  # activem quan qualsevol workflow del Content Hub acaba correctament.
  workflow_run:
    workflows:
      - "Content Hub — completar l'edició"
      - "Content Hub — fotografia editorial diària"
      - "Content Hub — peces setmanals"
    types: [completed]

concurrency:
  group: desplega-hostinger
  cancel-in-progress: false

jobs:
  desplega:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Descarrega el repositori
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Prepara lftp i restaura les dates dels fitxers
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp git-restore-mtime || sudo apt-get install -y -qq lftp
          # Amb les dates reals de cada fitxer, la pujada pot ser incremental:
          # els fitxers que no han canviat des de l'ultim desplegament se salten.
          git restore-mtime || echo "restore-mtime no disponible: es pujara tot"

      - name: Puja public/ per FTP (incremental, en paral·lel, amb reintents)
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          # TLS nomes al canal de control (com el curl --ftp-ssl-control d'abans):
          # el canal de dades en clar evita el bloqueig de l'FTPS de Hostinger.
          # Sense --delete: els MP3 d'assets/audio nomes viuen al servidor.
          lftp -u "u901078817.claude,$FTP_PASSWORD" \
            -e "set ftp:ssl-force yes; set ftp:ssl-protect-data no; set net:max-retries 3; set net:timeout 40; set net:reconnect-interval-base 5; mirror -R --only-newer --parallel=6 --verbose public/ /; bye" \
            ftp://srv1589.hstgr.io
          echo "Desplegament acabat."
