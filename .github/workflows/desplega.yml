name: Desplega la web a Hostinger

on:
  push:
    branches: [main]
    paths: ['public/**']
  workflow_dispatch:

jobs:
  desplega:
    runs-on: ubuntu-latest
    steps:
      - name: Descarrega el repositori
        uses: actions/checkout@v4

      - name: Puja public/ per FTPS a Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: srv1589.hstgr.io
          username: u901078817.claude
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./public/
          server-dir: ./
          dangerous-clean-slate: false
