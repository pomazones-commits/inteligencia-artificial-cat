name: Desplega la web a Hostinger

on:
  push:
    branches: [main]
    paths: ['public/**']
  workflow_dispatch:
  # Els commits del Content Hub es fan amb el GITHUB_TOKEN per defecte, i GitHub
  # Actions no encadena workflows a partir d'aquests pushos. Per aixo tambe ens
  # activem quan qualsevol workflow del Content Hub acaba correctament.
  workflow_run:
    workflows:
      - "Content Hub — completar l'edició"
      - "Content Hub — fotografia editorial diària"
      - "Content Hub — peces setmanals"
    types: [completed]

concurrency:
  group: desplega-hostinger
  cancel-in-progress: false

jobs:
  desplega:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Descarrega el repositori
        uses: actions/checkout@v4

      - name: Puja public/ per FTP (login xifrat, dades en clar)
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          set -e
          cd public
          errors=0
          # --ftp-ssl-control: TLS per al login, canal de dades en clar (evita el bloqueig de l'FTPS de Hostinger)
          while IFS= read -r f; do
            rel="${f#./}"
            if curl -sS --fail --ftp-ssl-control --ftp-create-dirs --connect-timeout 20 --max-time 120 \
                 -T "$f" -u "u901078817.claude:$FTP_PASSWORD" \
                 "ftp://srv1589.hstgr.io/$rel"; then
              echo "OK  $rel"
            else
              echo "FALLA  $rel"; errors=$((errors+1))
            fi
          done < <(find . -type f)
          echo "----"
          if [ "$errors" -gt 0 ]; then echo "$errors fitxers han fallat"; exit 1; fi
          echo "Tots els fitxers pujats correctament."
