name: Content Hub — peces setmanals

on:
  push:
    branches: [main]
    paths:
      - incoming/analysis.json
      - incoming/reflection.json
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: editorial-weekly-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validar-i-publicar:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[content-hub]')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validar l'anàlisi si n'hi ha una de nova
        run: |
          if [ -f incoming/analysis.json ]; then
            node automation/scripts/content-hub.mjs ingest-editorial --type analysis --input incoming/analysis.json --public-dir public --state-dir .content-state
          fi

      - name: Validar la reflexió si n'hi ha una de nova
        run: |
          if [ -f incoming/reflection.json ]; then
            node automation/scripts/content-hub.mjs ingest-editorial --type reflection --input incoming/reflection.json --public-dir public --state-dir .content-state
          fi

      - name: Desar les peces validades
        run: |
          git config user.name "intel·ligènciaartificial.cat bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/analysis.js public/reflection.js .content-state/
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "[content-hub] actualitza les peces setmanals"
          git pull --rebase origin main
          git push origin main
