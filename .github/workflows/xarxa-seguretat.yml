name: Xarxa de seguretat - publicacio dels lots

# Vigilant de reconciliacio d'extrem a extrem. No confia en l'encadenament de
# workflows (que ha demostrat ser fragil): comprova l'ESTAT FINAL real i repara
# el que calgui, sigui quin sigui el pas que ha fallat.
#   FASE A - el repo esta al dia? (el push del lot va disparar el Content Hub?)
#   FASE B - el que es serveix en viu a Hostinger = el que hi ha al repo?
#   FASE C - hi ha tots els MP3 de l'edicio en viu?
# Si algun pas falla, rellanca el workflow que toqui (content-hub, desplega o
# audio) via workflow_dispatch (que GitHub SI executa amb el GITHUB_TOKEN).
# Additiu i idempotent: nomes actua quan detecta una divergencia real. Per
# desactivar-ho: esborra aquest fitxer.

on:
  schedule:
    # Uns 15 min despres de cada lot. Lots a 06:05/10:05/14:05/18:05 hora de
    # Madrid; a l'estiu (UTC+2) 04:05/08:05/12:05/16:05 UTC i a l'hivern (UTC+1)
    # 05:05/09:05/13:05/17:05 UTC. Cobrim les dues tandes tot l'any; un fire de
    # mes no fa res si tot esta en ordre.
    - cron: '20 4,5,8,9,12,13,16,17 * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: xarxa-seguretat
  cancel-in-progress: false

jobs:
  vigila:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Recuperar el repositori amb l'historial
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Preparar Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Reconciliar l'estat final i reparar el que falli
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          cat > "$RUNNER_TEMP/safety-net.mjs" <<'SCRIPT'
          const API = 'https://api.github.com';
          const REPO = process.env.GH_REPO || process.env.GITHUB_REPOSITORY;
          const TOKEN = process.env.GH_TOKEN || process.env.GITHUB_TOKEN;
          const SITE = process.env.SITE_BASE || 'https://inteligencia-artificial.cat';
          const { execFileSync } = await import('node:child_process');
          const fs = await import('node:fs');

          const norm = (s) => (s == null ? null : s.replace(/\s+/g, ''));

          function needsFirstHop(runs, fileTimeISO) {
            if (!fileTimeISO) return false;
            const ft = new Date(fileTimeISO).getTime();
            return !runs.some((r) => {
              if (new Date(r.created_at).getTime() < ft) return false;
              return r.status !== 'completed' || r.conclusion === 'success';
            });
          }
          function deployStale(liveText, repoText) {
            if (repoText == null || liveText == null) return false;
            return norm(liveText) !== norm(repoText);
          }
          function readRepo(p) { try { return fs.readFileSync(p, 'utf8'); } catch { return null; } }
          function gitFileTime(files) {
            let latest = null;
            for (const f of files) {
              try {
                const o = execFileSync('git', ['log', '-1', '--format=%cI', '--', f], { encoding: 'utf8' }).trim();
                if (o && (!latest || new Date(o) > new Date(latest))) latest = o;
              } catch {}
            }
            return latest;
          }
          async function fetchText(url) {
            try { const r = await fetch(url, { cache: 'no-store' }); if (!r.ok) return null; return await r.text(); } catch { return null; }
          }
          async function liveExists(url) {
            try { const r = await fetch(url, { headers: { Range: 'bytes=0-0' }, cache: 'no-store' }); return r.status === 200 || r.status === 206; } catch { return false; }
          }
          async function api(path, init = {}) {
            return fetch(API + path, { ...init, headers: {
              Accept: 'application/vnd.github+json', Authorization: 'Bearer ' + TOKEN,
              'X-GitHub-Api-Version': '2022-11-28', 'User-Agent': 'iacat-safety-net', ...(init.headers || {}),
            } });
          }
          async function runsOf(workflow) {
            const res = await api('/repos/' + REPO + '/actions/workflows/' + workflow + '/runs?per_page=20');
            if (!res.ok) return null;
            return (await res.json()).workflow_runs || [];
          }
          async function inFlight(workflow) {
            const runs = await runsOf(workflow);
            if (runs == null) return null;
            return runs.some((r) => r.status !== 'completed');
          }
          async function dispatch(workflow) {
            const res = await api('/repos/' + REPO + '/actions/workflows/' + workflow + '/dispatches', { method: 'POST', body: JSON.stringify({ ref: 'main' }) });
            console.log((res.ok ? '  -> ' : '  x ') + workflow + (res.ok ? ' rellancat.' : ' error HTTP ' + res.status));
            return res.ok;
          }

          async function main() {
            if (!REPO || !TOKEN) throw new Error('Falten GH_REPO o GH_TOKEN.');
            let acted = 0;
            const bust = () => '?nc=' + Date.now();

            const FIRST = [
              { wf: 'content-hub.yml', files: ['incoming/news-batch.json'] },
              { wf: 'daily-visual.yml', files: ['incoming/daily-image.json'] },
              { wf: 'editorial-weekly.yml', files: ['incoming/analysis.json', 'incoming/reflection.json'] },
            ];
            for (const t of FIRST) {
              const ft = gitFileTime(t.files);
              if (!ft) { console.log('- A ' + t.wf + ': cap lot pendent.'); continue; }
              const runs = await runsOf(t.wf);
              if (runs == null) { console.log('! A ' + t.wf + ': runs no llegides; s-omet.'); continue; }
              if (needsFirstHop(runs, ft)) { console.log('AVIS A ' + t.wf + ': lot no processat. Rellancant...'); if (await dispatch(t.wf)) acted++; }
              else console.log('OK A ' + t.wf + ': lot ja processat al repo.');
            }

            const PUB = ['news.js', 'radar.js', 'daily-image.js', 'analysis.js', 'reflection.js'];
            let deployStaleAny = false;
            for (const f of PUB) {
              const repo = readRepo('public/' + f);
              if (repo == null) continue;
              const live = await fetchText(SITE + '/' + f + bust());
              if (live == null) { console.log('! B ' + f + ': no llegit en viu; s-omet.'); continue; }
              if (deployStale(live, repo)) { console.log('AVIS B ' + f + ': en viu NO coincideix amb el repo.'); deployStaleAny = true; }
              else console.log('OK B ' + f + ': en viu coincideix.');
            }
            if (deployStaleAny) {
              const busy = await inFlight('desplega.yml');
              if (busy) console.log('. B desplega ja en curs; s-espera.');
              else if (await dispatch('desplega.yml')) acted++;
            }

            const articles = readRepo('public/data/articles.json');
            if (articles) {
              let items = [];
              try { items = JSON.parse(articles).items || []; } catch { items = []; }
              const missing = [];
              for (const it of items) {
                const slug = (it.slug || '').trim();
                if (!slug) continue;
                if (!(await liveExists(SITE + '/assets/audio/' + slug + '.mp3' + bust()))) missing.push(slug);
              }
              if (missing.length) {
                console.log('AVIS C audio: falten ' + missing.length + ' MP3 en viu (' + missing.slice(0, 3).join(', ') + (missing.length > 3 ? '...' : '') + ').');
                const busy = await inFlight('audio-edicio.yml');
                if (busy) console.log('. C audio ja en curs; s-espera.');
                else if (await dispatch('audio-edicio.yml')) acted++;
              } else console.log('OK C audio: tots els MP3 de l-edicio hi son.');
            }

            console.log(acted ? ('Fet: ' + acted + ' workflow(s) rellancat(s).') : 'Fet: tot en ordre, cap accio.');
          }
          main().catch((e) => { console.error(e); process.exit(1); });
          SCRIPT
          node "$RUNNER_TEMP/safety-net.mjs"
