name: Content Hub — fotografia editorial diària

on:
  push:
    branches: [main]
    paths:
      - incoming/daily-image.json
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-visual-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validar-i-publicar:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[content-hub]')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Comprovar la fotografia i els textos
        run: >-
          node automation/scripts/content-hub.mjs ingest-daily-image
          --input incoming/daily-image.json
          --public-dir public
          --state-dir .content-state

      - name: Publicar la peça visual
        run: |
          git config user.name "intel·ligènciaartificial.cat bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/daily-image.js .content-state/
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "[content-hub] actualitza la fotografia editorial"
          git pull --rebase origin main
          git push origin main
