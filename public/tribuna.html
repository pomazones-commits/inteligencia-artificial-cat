<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#e9e5de">
  <meta name="description" content="La tribuna: articles d'opinió i anàlisi signats per veus expertes en intel·ligència artificial.">
  <link rel="canonical" href="https://inteligencia-artificial.cat/tribuna.html">
  <meta property="og:type" content="article">
  <meta property="og:locale" content="ca_ES">
  <meta property="og:title" content="La tribuna · intel·ligència artificial.cat">
  <meta property="og:description" content="Articles d'opinió signats per veus expertes en intel·ligència artificial.">
  <meta property="og:url" content="https://inteligencia-artificial.cat/tribuna.html">
  <title>La tribuna · intel·ligència artificial.cat</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css?v=2026071302">
  <style>
    /* Estils propis de la tribuna (no toquem styles.css) */
    .tribuna-author { display: flex; align-items: center; gap: 18px; margin: 26px 0 6px; padding: 16px 0; border-top: 1px solid rgba(17,21,38,.14); border-bottom: 1px solid rgba(17,21,38,.14); }
    .tribuna-author img { width: 84px; height: 84px; object-fit: cover; border-radius: 50%; }
    .tribuna-author strong { display: block; font-size: 15px; letter-spacing: -.01em; }
    .tribuna-author span { display: block; margin-top: 3px; color: #687086; font-size: 12px; line-height: 1.4; }
  </style>
</head>
<body style="background:#e9e5de">
  <main class="article-page" id="tribuna"><p class="eyebrow">CARREGANT LA TRIBUNA…</p></main>
  <script src="./tribuna.js?v=2026072401"></script>
  <script>
    const esc = s => String(s||'').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
    const t = window.IA_TRIBUNA;
    const el = document.querySelector('#tribuna');
    if (t && t.title) {
      document.title = t.title + ' · intel·ligència artificial.cat';
      const authorBlock = `<div class="tribuna-author">
          ${t.photo ? `<img src="${esc(t.photo)}" alt="${esc(t.photoAlt || ('Retrat de ' + (t.author||'')))}">` : ''}
          <div><strong>${esc(t.author||'')}</strong><span>${esc(t.role||'')}</span></div>
        </div>`;
      el.innerHTML = `<a class="brand" href="./">intel·ligència<br><em>artificial</em><span>.cat</span></a>
        <p class="eyebrow"><span class="tag">${esc(t.category||'TRIBUNA')}</span> · ${esc(t.read||'')} · ${esc(t.date||'')}</p>
        <h1>${esc(t.title)}</h1>
        <p class="article-dek">${esc(t.excerpt||'')}</p>
        ${authorBlock}
        <div class="article-body">${esc(t.body||'').split(/\n\n+/).map(p=>`<p>${p}</p>`).join('')}</div>
        <a class="text-link" href="./#tribuna">← Torna a l'edició</a>`;
    } else {
      el.innerHTML = `<a class="brand" href="./">intel·ligència<br><em>artificial</em><span>.cat</span></a><p class="eyebrow">TRIBUNA NO DISPONIBLE</p><h1>Ara mateix no hi ha cap tribuna publicada.</h1><a class="text-link" href="./">← Torna a l'edició</a>`;
    }
  </script>
</body>
</html>
