<body style="background:#e9e5de">
  <main class="article-page" id="analisi"><p class="eyebrow">CARREGANT L'ANÀLISI…</p></main>
  <script src="./analysis.js?v=2026071921"></script>
  <script>
    const esc = s => String(s||'').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
    const a = window.IA_ANALYSIS;
    const el = document.querySelector('#analisi');
    if (a && a.title) {
      document.title = a.title + ' · intel·ligència artificial.cat';
      el.innerHTML = `<a class="brand" href="./">intel·ligència<br><em>artificial</em><span>.cat</span></a>
        <p class="eyebrow"><span class="tag">${esc(a.category||'ANÀLISI')}</span> · ${esc(a.read||'7 MIN')} · ${esc(a.date||'')}</p>
        <h1>${esc(a.title)}</h1>
        <p class="article-dek">${esc(a.excerpt||'')}</p>
        <div class="article-body">${esc(a.body||'').split(/\n\n+/).map(p=>`<p>${p}</p>`).join('')}</div>
        <a class="text-link" href="./#avui">← Torna a l'edició</a>`;
    } else {
      el.innerHTML = `<a class="brand" href="./">intel·ligència<br><em>artificial</em><span>.cat</span></a><p class="eyebrow">ANÀLISI NO DISPONIBLE</p><h1>Torna-ho a provar en uns instants.</h1><a class="text-link" href="./">← Torna a l'edició</a>`;
    }
  </script>
</body>
